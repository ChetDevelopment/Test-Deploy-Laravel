# ===========================================
# Nginx Configuration: Vue 3 Frontend + Laravel Backend
# ===========================================

# Upstream for PHP-FPM
upstream php {
    server 127.0.0.1:9000;
}

server {
    listen 8080;
    server_name localhost;
    root /app/public;
    index index.php index.html;

    # ===========================================
    # Security Headers
    # ===========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===========================================
    # Frontend Static Files (Vue SPA)
    # ===========================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ===========================================
    # Backend API Routes
    # ===========================================
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
        
        # API specific headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        
        # Handle preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }
    }

    # ===========================================
    # PHP-FPM Configuration
    # ===========================================
    location ~ \.php$ {
        try_files $uri /index.php =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Laravel specific
        fastcgi_param APP_ENV production;
        fastcgi_param APP_DEBUG false;
        
        include fastcgi_params;
        
        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        
        # Buffering
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
    }

    # ===========================================
    # Laravel Storage (Uploaded Files)
    # ===========================================
    location /storage {
        alias /app/backend/storage/app/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Don't log storage requests
        access_log off;
    }

    # ===========================================
    # Deny Access to Sensitive Files
    # ===========================================
    location ~ /\.env {
        deny all;
    }
    
    location ~ /\.git {
        deny all;
    }
    
    location ~ /composer\.json {
        deny all;
    }
    
    location ~ /\. {
        deny all;
    }

    # ===========================================
    # Logs
    # ===========================================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ===========================================
    # Upload limits
    # ===========================================
    client_max_body_size 100M;
    client_body_timeout 120s;
}
