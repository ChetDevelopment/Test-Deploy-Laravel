version: "3"

services:

  backend:
    build: ./backend
    container_name: laravel_app
    volumes:
      - ./backend:/var/www
    ports:
      - "9000:9000"

  frontend:
    build: ./frontend
    container_name: vue_app
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/var/www/frontend/dist
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  database:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: vanda_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"